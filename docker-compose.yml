services:
  web:
    build:
      context: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://alphavest:alphavest@postgres:5432/alphavest_wealthos
      NEXT_PUBLIC_DEMO_MODE: "true"
      NEXT_PUBLIC_PHASE_TO_RUN: "1"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphavest
      POSTGRES_PASSWORD: alphavest
      POSTGRES_DB: alphavest_wealthos
    ports:
      - "5432:5432"
    volumes:
      - alphavest-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphavest -d alphavest_wealthos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alphavest-postgres:
